name: release

# Build xsay binaries + native installers for each supported (OS, GPU-
# backend) combination on a version tag (`v*`) and attach them to the
# matching GitHub Release. Manual dispatch is wired too, so you can
# dry-run the workflow without cutting a tag.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # upload release assets

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      # One variant failing (missing toolchain on a runner, transient
      # apt hiccup, etc.) shouldn't prevent the others from uploading —
      # a CPU Linux binary is always useful even if Vulkan fails.
      fail-fast: false
      matrix:
        include:
          # Linux — CPU (primary download, ships the .deb too).
          - os: ubuntu-22.04
            label: linux-x64-cpu
            features: ""
            apt: "libx11-dev libxtst-dev libasound2-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev cmake pkg-config"
            make_deb: true
            binary_name: xsay
          # Linux — Vulkan (cross-vendor GPU, NVIDIA/AMD/Intel).
          # Uses 24.04 because `glslc` isn't a separate apt package in
          # Ubuntu 22.04 (only available via libshaderc-dev on older
          # releases), and whisper.cpp's Vulkan backend cmake probes
          # for the binary by name.
          - os: ubuntu-24.04
            label: linux-x64-vulkan
            features: "vulkan"
            apt: "libx11-dev libxtst-dev libasound2-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev libvulkan-dev glslang-tools glslc cmake pkg-config"
            make_deb: false
            binary_name: xsay
          # macOS Apple Silicon — Metal GPU.
          - os: macos-14
            label: macos-arm64-metal
            features: "metal"
            apt: ""
            make_deb: false
            binary_name: xsay
          # Windows — raw .exe + NSIS installer.
          - os: windows-latest
            label: windows-x64
            features: ""
            apt: ""
            make_deb: false
            binary_name: xsay.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: runner.os == 'Linux' && matrix.apt != ''
        run: |
          sudo apt-get update
          # shellcheck disable=SC2086
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.label }}

      - name: Build
        shell: bash
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cargo build --release --features ${{ matrix.features }}
          else
            cargo build --release
          fi

      - name: Stage raw binary
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/release/${{ matrix.binary_name }}" "dist/xsay-${{ matrix.label }}.exe"
          else
            cp "target/release/${{ matrix.binary_name }}" "dist/xsay-${{ matrix.label }}"
            strip "dist/xsay-${{ matrix.label }}" || true
          fi

      # ---- .deb for Linux CPU ----
      - name: Install cargo-deb
        if: matrix.make_deb
        run: cargo install --locked cargo-deb

      - name: Build .deb
        if: matrix.make_deb
        shell: bash
        run: |
          cargo deb --no-build
          # cargo-deb emits xsay_<ver>-1_amd64.deb with underscores. Our
          # release glob is `xsay-*` for consistency with the raw binary
          # names, so rename on copy into dist/.
          SRC=$(ls target/debian/xsay_*.deb | head -1)
          VER=$(basename "$SRC" | sed -E 's/^xsay_([^_]+)_amd64\.deb$/\1/')
          cp "$SRC" "dist/xsay-linux-x64-${VER}.deb"

      # ---- NSIS installer for Windows ----
      - name: Build NSIS installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # NSIS (makensis) is pre-installed on windows-latest runners,
          # but not always on PATH — point at it explicitly.
          $nsis = 'C:\Program Files (x86)\NSIS\makensis.exe'
          if (-not (Test-Path $nsis)) {
            $nsis = (Get-Command makensis -ErrorAction SilentlyContinue).Source
          }
          if (-not $nsis) {
            throw "makensis.exe not found on the runner; install NSIS"
          }
          $version = "${{ github.ref_name }}" -replace '^v',''
          if ([string]::IsNullOrEmpty($version)) { $version = "0.0.0-dev" }
          Copy-Item "target/release/xsay.exe" "windows/xsay.exe"
          # /D for defines needs to be passed before the script path;
          # NSIS 3.x syntax is /DNAME=VALUE with no spaces.
          & "$nsis" "/DAPP_VERSION=$version" windows/installer.nsi
          if ($LASTEXITCODE -ne 0) {
            throw "NSIS build failed with exit $LASTEXITCODE"
          }
          # Rename to fit dist/xsay-* so the release-asset glob catches
          # the setup binary alongside the raw xsay.exe.
          Get-ChildItem "windows/xsay-*-setup.exe" | ForEach-Object {
            Move-Item $_.FullName "dist/xsay-windows-x64-setup-$version.exe"
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: xsay-${{ matrix.label }}
          path: dist/xsay-*
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/xsay-*
