name: xsay
base: core22
version: '0.1.0'
summary: Offline voice-to-text with a configurable hotkey
description: |
  xsay captures microphone audio while a configurable hotkey is held
  (or on tap-toggle), transcribes it offline with Whisper (whisper.cpp)
  or SenseVoice (sherpa-onnx), and types the result into the focused
  window. Supports Chinese, English, Japanese, Korean, and Cantonese,
  on both X11 and Wayland sessions.

  Features:
    * Fully offline — no audio leaves the machine
    * Two ASR backends: Whisper and SenseVoice/Paraformer
    * Global hotkey via evdev (works on Wayland after joining 'input' group)
    * System tray + animated recording overlay
    * Clipboard-based paste with /dev/uinput synthesized Ctrl+V

grade: stable
confinement: classic   # needed for /dev/uinput + global hotkey capture

architectures:
  - build-on: amd64

apps:
  xsay:
    command: bin/xsay
    desktop: share/applications/xsay.desktop
    environment:
      # So xsay's RPATH=$ORIGIN finds libsherpa-onnx-c-api.so
      # next to the binary inside the snap.
      LD_LIBRARY_PATH: $SNAP/bin:$LD_LIBRARY_PATH
      # Force XWayland for the GUI so overlay positioning works on
      # GNOME (same as the standalone binary does via XSAY_GUI).
      XSAY_GUI: x11

parts:
  xsay:
    plugin: rust
    source: .
    rust-features: [sensevoice]
    build-packages:
      - build-essential
      - cmake
      - pkg-config
      - libx11-dev
      - libxtst-dev
      - libasound2-dev
      - libxdo-dev
      - libgtk-3-dev
      - libayatana-appindicator3-dev
      - libclang-dev
      - libssl-dev
    stage-packages:
      - libx11-6
      - libxtst6
      - libasound2
      - libgtk-3-0
      - libayatana-appindicator3-1
      - libxdo3
    override-build: |
      craftctl default
      # Copy the sherpa-onnx shared lib that sherpa-rs downloads into
      # target/release/ next to the installed binary so $ORIGIN rpath
      # resolves at runtime inside the snap.
      SHERPA_LIBS=$(find "$CRAFT_PART_BUILD/target/release" -maxdepth 1 \
        -name 'libsherpa-onnx-*.so' -print 2>/dev/null || true)
      if [ -n "$SHERPA_LIBS" ]; then
        mkdir -p "$CRAFT_PART_INSTALL/bin"
        cp -v $SHERPA_LIBS "$CRAFT_PART_INSTALL/bin/"
      fi

  desktop-file:
    plugin: dump
    source: snap/local
    organize:
      xsay.desktop: share/applications/xsay.desktop
      xsay.png: share/icons/hicolor/256x256/apps/xsay.png
